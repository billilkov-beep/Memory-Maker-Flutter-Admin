workflows:
  android-apk:
    name: Memory Maker Admin Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - memorymaker_env
    scripts:
      - name: Create environment file
        script: |
          cat > .env <<EOF_ENV
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          APP_URL=${APP_URL}
          DEMO_MODE=${DEMO_MODE}
          EOF_ENV
      - name: Recreate Android project
        script: |
          rm -rf android
          flutter create . --platforms=android --org com.memorymaker --project-name memory_maker_admin
      - name: Patch Android app name and icon
        script: |
          python3 - <<'PY'
          from pathlib import Path
          import shutil
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text()
          text = text.replace('android:label="memory_maker_admin"', 'android:label="Memory Maker Admin"')
          text = text.replace('android:label="memory_maker_admin"', 'android:label="Memory Maker Admin"')
          manifest.write_text(text)
          icon = Path('assets/admin_icon.png')
          for folder in ['mipmap-mdpi','mipmap-hdpi','mipmap-xhdpi','mipmap-xxhdpi','mipmap-xxxhdpi']:
              dest = Path('android/app/src/main/res') / folder / 'ic_launcher.png'
              dest.parent.mkdir(parents=True, exist_ok=True)
              if icon.exists():
                  shutil.copyfile(icon, dest)
          PY
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get
      - name: Build release APK
        script: |
          flutter build apk --release -t lib/main.dart
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
