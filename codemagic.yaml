workflows:
  android-apk:
    name: Memory Maker Admin Android APK
    max_build_duration: 60

    environment:
      flutter: stable
      groups:
        - memorymaker_env

    scripts:
      - name: Verify Supabase env variables
        script: |
          echo "Checking env..."

          if [ -z "$SUPABASE_URL" ]; then
            echo "ERROR: SUPABASE_URL is missing"
            exit 1
          fi

          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "ERROR: SUPABASE_ANON_KEY is missing"
            exit 1
          fi

          if [ -z "$APP_URL" ]; then
            export APP_URL="https://memorymaker.com"
          fi

          if [ -z "$DEMO_MODE" ]; then
            export DEMO_MODE="false"
          fi

          echo "SUPABASE_URL length: ${#SUPABASE_URL}"
          echo "SUPABASE_ANON_KEY length: ${#SUPABASE_ANON_KEY}"
          echo "APP_URL: $APP_URL"
          echo "DEMO_MODE: $DEMO_MODE"

      - name: Create .env file
        script: |
          printf "SUPABASE_URL=%s\n" "$SUPABASE_URL" > .env
          printf "SUPABASE_ANON_KEY=%s\n" "$SUPABASE_ANON_KEY" >> .env
          printf "APP_URL=%s\n" "$APP_URL" >> .env
          printf "DEMO_MODE=%s\n" "$DEMO_MODE" >> .env

          echo ".env created:"
          cat .env | sed 's/SUPABASE_ANON_KEY=.*/SUPABASE_ANON_KEY=HIDDEN/'

      - name: Force .env into Flutter assets
        script: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path("pubspec.yaml")
          text = p.read_text()

          if "flutter:" not in text:
              text += "\nflutter:\n  uses-material-design: true\n  assets:\n    - .env\n    - assets/\n"
          else:
              if "uses-material-design:" not in text:
                  text = text.replace("flutter:\n", "flutter:\n  uses-material-design: true\n", 1)

              if "assets:" not in text:
                  text = text.replace("flutter:\n", "flutter:\n  assets:\n    - .env\n    - assets/\n", 1)
              else:
                  if "- .env" not in text:
                      text = text.replace("assets:\n", "assets:\n    - .env\n", 1)
                  if "- assets/" not in text:
                      text = text.replace("assets:\n", "assets:\n    - assets/\n", 1)

          p.write_text(text)
          print(p.read_text())
          PY

      - name: Create Android project
        script: |
          rm -rf android
          flutter create . --platforms=android --org com.memorymaker --project-name memorymaker_admin_app

      - name: Patch Android app name and internet permission
        script: |
          python3 - <<'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text()

          permissions = [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />'
          ]

          for permission in reversed(permissions):
              if permission not in text:
                  text = text.replace(
                      '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                      '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\\n    ' + permission
                  )

          text = text.replace('android:label="memorymaker_admin_app"', 'android:label="Memory Maker Admin"')
          manifest.write_text(text)
          print("Android manifest patched")
          PY

      - name: Get packages
        script: |
          flutter clean
          flutter pub get

      - name: Build release APK
        script: |
          flutter build apk --release -t lib/main.dart \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=APP_URL="$APP_URL" \
            --dart-define=DEMO_MODE="$DEMO_MODE"

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
