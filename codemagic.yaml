workflows:
  android-apk:
    name: Memory Maker Admin Android APK
    max_build_duration: 60

    environment:
      flutter: stable
      groups:
        - memorymaker_env

    scripts:
      - name: Create environment file
        script: |
          cat > .env <<EOF_ENV
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          APP_URL=${APP_URL}
          DEMO_MODE=${DEMO_MODE}
          EOF_ENV

      - name: Recreate Android project
        script: |
          rm -rf android
          flutter create . --platforms=android --org com.memorymaker --project-name memory_maker_admin

      - name: Patch Android public release settings
        script: |
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text()
          root = '<manifest xmlns:android="http://schemas.android.com/apk/res/android">'
          permissions = [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />'
          ]
          for p in reversed(permissions):
              if p not in text:
                  text = text.replace(root, root + '\n    ' + p)
          text = text.replace('android:label="memory_maker_admin"', 'android:label="Memory Maker Admin"')
          text = text.replace('android:label="memory_maker_admin"', 'android:label="Memory Maker Admin"')
          manifest.write_text(text)
          PY

      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Apply launcher icon
        script: |
          dart run flutter_launcher_icons || true

      - name: Build release APK
        script: |
          flutter build apk --release -t lib/main.dart

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
