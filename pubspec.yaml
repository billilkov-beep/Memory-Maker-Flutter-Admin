name: memory_maker_admin
version: 1.0.1+2
publish_to: 'none'
description: Memory Maker Admin public release app.

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.12.4
  flutter_dotenv: ^5.2.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/app_icon.png
  adaptive_icon_background: '#FFF7F2'
  adaptive_icon_foreground: assets/app_icon.png
